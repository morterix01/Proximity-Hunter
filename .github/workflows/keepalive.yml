name: Keep API awake

# Render's free plan sleeps after ~15 min idle. Pinging /health every ~10 min
# keeps it warm so the API is effectively always-on, for free.
# Setup: repo → Settings → Secrets and variables → Actions → Variables →
#        New variable → name API_URL, value https://<your-service>.onrender.com
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        run: |
          if [ -z "${{ vars.API_URL }}" ]; then
            echo "::warning::Set the repo variable API_URL to your Render URL to enable keep-alive."
            exit 0
          fi
          echo "Pinging ${{ vars.API_URL }}/health"
          curl -fsS --max-time 90 "${{ vars.API_URL }}/health" && echo "  -> awake"
