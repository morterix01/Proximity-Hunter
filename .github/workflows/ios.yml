name: iOS build

on:
  push:
    paths: ["ios/**", ".github/workflows/ios.yml"]
  pull_request:
    paths: ["ios/**", ".github/workflows/ios.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14          # ships a recent Xcode 15.x
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages (Firebase)
        run: xcodebuild -resolvePackageDependencies -project GlitchHunter.xcodeproj -scheme GlitchHunter

      # Build for the simulator with code signing OFF — no Apple Developer
      # account or certificates required (a real device .ipa would need both).
      - name: Build (iOS Simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project GlitchHunter.xcodeproj \
            -scheme GlitchHunter \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
