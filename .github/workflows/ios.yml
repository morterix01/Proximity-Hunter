name: iOS build

on:
  push:
    paths: ["ios/**", ".github/workflows/ios.yml"]
  pull_request:
    paths: ["ios/**", ".github/workflows/ios.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14          # ships a recent Xcode 15.x
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages (Firebase)
        run: |
          xcodebuild -resolvePackageDependencies \
            -project GlitchHunter.xcodeproj -scheme GlitchHunter \
            -derivedDataPath build -clonedSourcePackagesDirPath build/spm

      # Build for the simulator with code signing OFF — no Apple Developer
      # account or certificates required (a real device .ipa would need both).
      - name: Build (iOS device, unsigned)
        run: |
          set +e
          xcodebuild \
            -project GlitchHunter.xcodeproj \
            -scheme GlitchHunter \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath build/spm \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            grep -E "error:|fatal error|Undefined symbol|ld: |No such module" build.log \
              | head -10 | while IFS= read -r l; do echo "::error::$l"; done
          fi
          exit "$status"

      # Package the built .app into an UNSIGNED .ipa. It can't be installed
      # directly, but Sideloadly / AltStore re-sign it with a free Apple ID.
      - name: Package unsigned .ipa
        run: |
          APP=$(find build/Build/Products -type d -name "GlitchHunter.app" | head -1)
          echo "Found app: $APP"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          zip -qry GlitchHunter-unsigned.ipa Payload
          ls -lh GlitchHunter-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlitchHunter-unsigned-ipa
          path: ios/GlitchHunter-unsigned.ipa   # action paths are relative to repo root, not the job working-directory
          if-no-files-found: error
          retention-days: 30
